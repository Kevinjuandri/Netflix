<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Scene</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #141414;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(20,20,20,0.9) 80%, transparent);
        }
        .navbar img {
            width: 120px;
        }
        .navbar ul {
            list-style: none;
            display: flex;
        }
        .navbar ul li {
            margin-left: 20px;
            font-size: 16px;
            font-weight: bold;
        }
        .navbar ul li a {
            color: white;
            text-decoration: none;
        }
        .navbar ul li a:hover {
            color: #e50914;
            transition: color 0.3s ease-in-out;
        }

        .game-switch {
            margin-top: 250px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 50px auto 0 auto;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
            display: none;
        }

        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ff6699;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
        }
        
        button {
            background-color: #ff6699;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 16px;
        }
        button:hover {
            background-color: #ff3366;
        }

        .feedback {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .correct {
            color: green;
        }
        .wrong {
            color: red;
        }


/* Pastikan hanya game yang sedang dimainkan yang tampil */
.container {
    display: none;
}

    </style>
</head>
<body>
    <header class="navbar">
        <img src="imagesNet/Netflix-Logo-2014-present-removebg-preview.png" alt="Netflix Logo">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Us.html">Us</a></li>
            <li><a href="Randomscene.html">Random</a></li>
        </ul>
    </header>

    <div class="game-switch">
        <button onclick="switchGame(1)">Game 1</button>
        <button onclick="switchGame(2)">Game 2</button>
        <button onclick="switchGame(3)">Game 3</button>
    </div>
    
    <div id="game1" class="container" style="display: block;">
        <h1>Game Scavenger Hunt</h1>
        <p id="clue">Clue 1: A celestial being known for beauty and grace.</p>
        <input type="text" id="answer" placeholder="Masukkan jawaban">
        <button onclick="checkAnswer()">Submit</button>
        <p id="feedback" class="feedback"></p>
    </div>

    <div id="game2" class="container">
        <h1>Game Tebak Kata</h1>
        <p id="word-clue">Clue: 👩✨💖</p>
        <input type="text" id="word-answer" placeholder="Masukkan jawaban">
        <button onclick="checkWordAnswer()">Submit</button>
        <p id="word-feedback" class="feedback"></p>
    </div>

    <div id="game3" class="container">
        <h1>Trivia Quiz</h1>
        <p id="quiz-question">Loading question...</p>
        <div id="quiz-options"></div>
        <p id="quiz-feedback" class="feedback"></p>
    </div>

    <script>
        let answers = ["angel", "who", "beautiful"];
let currentStep = 0;
let gameProgress = 1; // Mulai dari game 1

document.addEventListener("DOMContentLoaded", () => {
    lockGames();
    loadQuiz();
});

function checkAnswer() {
    let input = document.getElementById("answer").value.toLowerCase();
    let feedback = document.getElementById("feedback");
    
    if (input === answers[currentStep]) {
        feedback.innerText = "Correct Answer!";
        feedback.className = "feedback correct";
        currentStep++;
        if (currentStep < answers.length) {
            updateClue();
        } else {
            feedback.innerText = "Selamat! Game 1 selesai.";
            unlockGame(2);
        }
        document.getElementById("answer").value = "";
    } else {
        feedback.innerText = "Wrong Answer! Try again.";
        feedback.className = "feedback wrong";
    }
}

function updateClue() {
    let clues = [
        "Clue 1: A celestial being known for beauty and grace.",
        "Clue 2: A common linking word in English.",
        "Clue 3: A word that describes someone visually appealing."
    ];
    document.getElementById("clue").innerText = clues[currentStep];
}

function checkWordAnswer() {
    let input = document.getElementById("word-answer").value.toLowerCase();
    let feedback = document.getElementById("word-feedback");
    
    if (input === "beautiful kind woman") {
        feedback.innerText = "Correct Answer! Game 2 selesai.";
        feedback.className = "feedback correct";
        unlockGame(3);
    } else {
        feedback.innerText = "Wrong Answer! Try again.";
        feedback.className = "feedback wrong";
    }
}

function checkQuizAnswer(selected, correct) {
    let feedback = document.getElementById("quiz-feedback");
    if (selected === correct) {
        feedback.innerText = "Correct Answer! 🎉";
        feedback.className = "feedback correct";
        alert("Selamat! Anda mendapatkan hadiah!");
    } else {
        feedback.innerText = "Wrong Answer! ❌";
        feedback.className = "feedback wrong";
    }
}

function lockGames() {
    document.querySelectorAll(".game-switch button").forEach((button, index) => {
        if (index + 1 > gameProgress) {
            button.disabled = true;
        }
    });
}

function unlockGame(gameNumber) {
    gameProgress = gameNumber;
    document.querySelectorAll(".game-switch button")[gameNumber - 1].disabled = false;
}

function switchGame(gameNumber) {
    document.querySelectorAll(".container").forEach(container => {
        container.style.display = "none";
    });
    document.getElementById("game" + gameNumber).style.display = "block";
}

    </script>
</body>
</html>
